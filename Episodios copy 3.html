<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime Player</title>
  <style>
    :root {
      --bg: #111;
      --header-bg: #222;
      --text-color: #fff;
      --highlight: #00ffcc;
      --card-bg: #1a1a1a;
      --hover-bg: #2a2a2a;
      --comment-bg: #1a1a1a;
    }

    body.light {
      --bg: #f2f2f2;
      --header-bg: #ddd;
      --text-color: #111;
      --highlight: #008080;
      --card-bg: #fff;
      --hover-bg: #e0e0e0;
      --comment-bg: #f9f9f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Segoe UI', sans-serif;
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    header {
      padding: 20px;
      text-align: center;
      background: var(--header-bg);
      color: var(--highlight);
      font-size: 1.8rem;
      font-weight: bold;
      text-shadow: 1px 1px 4px #000;
    }

    .toggle-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: var(--highlight);
      color: #000;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 1000;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
      gap: 20px;
      justify-content: center;
    }

    .video-section {
      flex: 1 1 100%;
      max-width: 800px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
    }

    .video-section iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }

    .server-selector {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    .server-selector button {
      background: var(--highlight);
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .episodes {
      flex: 1 1 100%;
      max-width: 800px;
      background: var(--card-bg);
      border-radius: 10px;
      padding: 15px;
      overflow-x: auto;
    }

    .episodes h2 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: var(--highlight);
    }

    .episode {
      padding: 8px 10px;
      margin-bottom: 8px;
      background: var(--hover-bg);
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .episode:hover {
      background: var(--highlight);
      color: #000;
    }

    .comments {
      margin-top: 30px;
      padding: 20px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .comments h3 {
      margin-bottom: 10px;
      color: var(--highlight);
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: vertical;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--text-color);
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: var(--highlight);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .comment-box {
      background: var(--comment-bg);
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
    }

    @media (min-width: 768px) {
      .container {
        flex-direction: row;
        align-items: flex-start;
      }

      .video-section {
        flex: 1 1 640px;
      }

      .episodes {
        flex: 1 1 250px;
        max-height: 480px;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>

  <button class="toggle-btn" onclick="toggleTheme()">🌙</button>

  <header>Horimiya en latino</header>

  <div class="container">
    <div class="video-section" id="video-player">
      <iframe id="video-frame" src="https://mivalyo.com/embed/hn1g7a7ly4hq" allowfullscreen></iframe>
      <div class="server-selector">
        <button onclick="changeServer(1)">Servidor 1</button>
        <button onclick="changeServer(2)">Servidor 2</button>
      </div>
    </div>

    <div class="episodes">
      <h2>Episodios</h2>
      <div class="episode" onclick="setEpisode(1)">Episodio 1</div>
      <div class="episode" onclick="setEpisode(2)">Episodio 2</div>
      <div class="episode" onclick="setEpisode(3)">Episodio 3</div>
      <div class="episode" onclick="setEpisode(4)">Episodio 4</div>
    </div>
  </div>

  <div class="comments">
    <h3>Comentarios</h3>
    <textarea id="comentario" rows="4" placeholder="Escribe tu comentario..."></textarea>
    <button onclick="agregarComentario()">Publicar</button>
    <div id="comentarios-lista"></div>
  </div>

  <script>
    const episodios = {
      1: {
        s1: "https://mivalyo.com/embed/hn1g7a7ly4hq",
        s2: "https://filemoon.sx/e/ejemplo1"
      },
      2: {
        s1: "https://mivalyo.com/embed/yjn9k52cs45h",
        s2: "https://filemoon.sx/e/ejemplo2"
      },
      3: {
        s1: "https://mivalyo.com/embed/vdoox3vwnqqh",
        s2: "https://filemoon.sx/e/ejemplo3"
      },
      4: {
        s1: "https://mivalyo.com/embed/304qibw0ynye",
        s2: "https://filemoon.sx/e/ejemplo4"
      }
    };

    let episodioActual = 1;
    let servidorActual = 1;

    function setEpisode(num) {
      episodioActual = num;
      changeServer(servidorActual);
    }

    function changeServer(servidor) {
      servidorActual = servidor;
      const url = servidor === 1 ? episodios[episodioActual].s1 : episodios[episodioActual].s2;
      document.getElementById("video-frame").src = url;
    }

    function agregarComentario() {
      const texto = document.getElementById("comentario").value.trim();
      if (texto !== "") {
        const div = document.createElement("div");
        div.className = "comment-box";
        div.innerText = texto;
        document.getElementById("comentarios-lista").prepend(div);
        document.getElementById("comentario").value = "";
      }
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }
  </script>

</body>
</html>
