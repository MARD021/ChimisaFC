<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Deportivos</title>
    <link rel="stylesheet" href="eventos.css">
</head>
<body>
    <div class="container">
        <h2>Chimisa FC</h2>
        <h1>Eventos Deportivos (<span id="current-time"></span>) (HD)</h1>
<p class="subtitle">Español / <span class="highlight">5 Minutos antes de iniciar.</span></p>
<div class="events-list">
    <div class="event">
        <div class="event-info">Copa del Rey: Barbastro vs Barcelona</div>
        <div class="event-actions">
            <button 
                class="btn-watch yellow" 
                onclick="openLink('https://streamtp2.com/global1.php?stream=dsports')">
                Ver
            </button>
            <span class="status live">En Vivo</span>          
</div>
</div>
<div class="events-list">
    <div class="event">
        <div class="event-info">Copa del Rey: Barbastro vs Barcelona ingles</div>
        <div class="event-actions">
            <button 
                class="btn-watch yellow" 
                onclick="openLink('https://streamtp2.com/global1.php?stream=sportv_4pt')">
                Ver
            </button>
            <span class="status live">En Vivo</span>
</div>
</div>
<div class="events-list">
    <div class="event">
        <div class="event-info">Copa del Rey: Barbastro vs Barcelona ingles</div>
        <div class="event-actions">
            <button 
                class="btn-watch yellow" 
                onclick="openLink('https://streamtp2.com/global1.php?stream=espnplus02')">
                Ver
            </button>
            <span class="status live">En Vivo</span>
</div>
</div>
    <script>
        // Función para actualizar el reloj
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const formattedTime = `${hours}:${minutes}:${seconds}`;
            document.getElementById('current-time').textContent = formattedTime;
        }

        // Función para redirigir al enlace al hacer clic en "Ver"
        function openLink(url) {
            window.open(url, '_blank'); // Abre el enlace en una nueva pestaña
        }

        // Actualizar el reloj cada segundo
        setInterval(updateClock, 1000);
        // Inicializar el reloj al cargar la página
        updateClock();
    </script>
</body>
</html>
